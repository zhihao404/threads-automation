name = "threads-automation"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

# D1 Database
# NOTE: Replace database_id with your actual D1 database ID before deploying.
# You can find it via: wrangler d1 list
# For local dev, this placeholder is sufficient as miniflare creates a local DB.
[[d1_databases]]
binding = "DB"
database_name = "threads-automation-db"
database_id = "placeholder-replace-with-actual-id"
migrations_dir = "drizzle/migrations"

# R2 Bucket for media uploads
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "threads-media"

# KV Namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-replace-with-actual-id"

# Cloudflare Queue (producer only - consumed by the worker)
[[queues.producers]]
queue = "threads-post-queue"
binding = "POST_QUEUE"

# Environment variables (set via wrangler secret)
# THREADS_APP_ID
# THREADS_APP_SECRET
# BETTER_AUTH_SECRET
# AI_PROVIDER - anthropic / openai / gemini / auto（未指定時は ANTHROPIC_API_KEY を優先）
# ANTHROPIC_API_KEY
# ANTHROPIC_MODEL - optional
# GEMINI_API_KEY
# GEMINI_MODEL - optional
# OPENAI_API_KEY
# OPENAI_MODEL - optional
# ENCRYPTION_KEY
# WEBHOOK_VERIFY_TOKEN - Token for verifying Threads webhook subscription requests
# STRIPE_SECRET_KEY - Stripe API secret key (sk_live_... or sk_test_...)
# STRIPE_WEBHOOK_SECRET - Stripe webhook endpoint signing secret (whsec_...)
# STRIPE_PRO_PRICE_ID - Stripe Price ID for the Pro plan (price_...)
# STRIPE_BUSINESS_PRICE_ID - Stripe Price ID for the Business plan (price_...)

[vars]
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
